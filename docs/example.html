<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Hello World Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: light-dark(#f1f5f9, #1e293b);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      .card {
        background: light-dark(white, #334155);
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        border: 1px solid light-dark(#e2e8f0, #475569);
        max-width: 400px;
      }

      h1 {
        font-size: 1.5rem;
        color: light-dark(#1e293b, #f1f5f9);
        margin-bottom: 0.5rem;
      }

      p {
        color: light-dark(#64748b, #94a3b8);
        font-size: 1rem;
      }

      code {
        background: light-dark(#f1f5f9, #1e293b);
        padding: 0.125rem 0.375rem;
        border-radius: 4px;
        font-size: 0.875em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Hello, World!</h1>
      <p>This is a demo loaded via the <code>src</code> attribute.</p>
    </div>
  </body>
</html>
